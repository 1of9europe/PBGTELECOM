<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1220"/>
      <stop offset="45%" stop-color="#0d1828"/>
      <stop offset="100%" stop-color="#060b14"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2d45" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0f1a2e" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="glass-reflect" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.12"/>
      <stop offset="40%" stop-color="#38bdf8" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="floor" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a1018"/>
      <stop offset="50%" stop-color="#111c2e"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="65%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#1d4ed8" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cam-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#0891b2" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="50%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="100%" stop-color="#082f49"/>
    </linearGradient>
    <filter id="soft-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#spotlight)"/>
  <rect width="1600" height="900" filter="url(#grain)" opacity="0.6"/>

  <!-- Distant building facade -->
  <rect x="80" y="120" width="1440" height="580" rx="6" fill="#0c1525"/>
  <rect x="80" y="120" width="1440" height="580" rx="6" fill="url(#glass-reflect)"/>

  <!-- Glass panels grid -->
  <g opacity="0.55">
    <rect x="120" y="160" width="180" height="220" rx="2" fill="#152238" stroke="#1e3a5f" stroke-width="1"/>
    <rect x="320" y="160" width="180" height="220" rx="2" fill="#152238" stroke="#1e3a5f" stroke-width="1"/>
    <rect x="520" y="160" width="180" height="220" rx="2" fill="#152238" stroke="#1e3a5f" stroke-width="1"/>
    <rect x="720" y="160" width="180" height="220" rx="2" fill="#152238" stroke="#1e3a5f" stroke-width="1"/>
    <rect x="920" y="160" width="180" height="220" rx="2" fill="#152238" stroke="#1e3a5f" stroke-width="1"/>
    <rect x="1120" y="160" width="180" height="220" rx="2" fill="#152238" stroke="#1e3a5f" stroke-width="1"/>
    <rect x="1320" y="160" width="160" height="220" rx="2" fill="#152238" stroke="#1e3a5f" stroke-width="1"/>
    <rect x="120" y="400" width="180" height="220" rx="2" fill="#111c30" stroke="#1e3a5f" stroke-width="0.8"/>
    <rect x="320" y="400" width="180" height="220" rx="2" fill="#111c30" stroke="#1e3a5f" stroke-width="0.8"/>
    <rect x="520" y="400" width="180" height="220" rx="2" fill="#111c30" stroke="#1e3a5f" stroke-width="0.8"/>
    <rect x="1120" y="400" width="180" height="220" rx="2" fill="#111c30" stroke="#1e3a5f" stroke-width="0.8"/>
    <rect x="1320" y="400" width="160" height="220" rx="2" fill="#111c30" stroke="#1e3a5f" stroke-width="0.8"/>
  </g>

  <!-- Entrance glass doors -->
  <rect x="700" y="380" width="200" height="300" rx="4" fill="url(#glass)" stroke="#2d4a6f" stroke-width="1.5"/>
  <rect x="710" y="390" width="85" height="280" rx="2" fill="#0a1628" opacity="0.7"/>
  <rect x="805" y="390" width="85" height="280" rx="2" fill="#0a1628" opacity="0.7"/>
  <line x1="800" y1="390" x2="800" y2="670" stroke="#334155" stroke-width="2"/>
  <rect x="700" y="380" width="200" height="300" rx="4" fill="url(#glass-reflect)" opacity="0.5"/>

  <!-- Floor -->
  <rect x="0" y="680" width="1600" height="220" fill="url(#floor)"/>
  <ellipse cx="800" cy="700" rx="420" ry="30" fill="#000" opacity="0.35"/>

  <!-- CCTV camera mount (left) -->
  <g transform="translate(180, 200)">
    <ellipse cx="70" cy="200" rx="35" ry="8" fill="#000" opacity="0.4"/>
    <rect x="62" y="80" width="16" height="120" fill="url(#metal)" rx="2"/>
    <rect x="30" y="60" width="80" height="48" rx="24" fill="url(#metal)"/>
    <rect x="38" y="68" width="64" height="32" rx="16" fill="#1e293b"/>
    <circle cx="70" cy="84" r="14" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    <circle cx="70" cy="84" r="8" fill="url(#cam-glow)"/>
    <circle cx="67" cy="81" r="3" fill="#e0f2fe" opacity="0.8"/>
    <!-- IR LEDs -->
    <circle cx="48" cy="78" r="2.5" fill="#ef4444" opacity="0.7"/>
    <circle cx="92" cy="78" r="2.5" fill="#ef4444" opacity="0.7"/>
    <!-- Scan cone -->
    <path d="M70 98 L40 280 L100 280 Z" fill="#22d3ee" opacity="0.04"/>
    <path d="M70 98 L55 280 L85 280 Z" fill="#22d3ee" opacity="0.06"/>
  </g>

  <!-- CCTV dome camera (right ceiling) -->
  <g transform="translate(1180, 140)">
    <ellipse cx="60" cy="10" rx="50" ry="12" fill="#1e293b"/>
    <ellipse cx="60" cy="35" rx="45" ry="30" fill="url(#metal)"/>
    <ellipse cx="60" cy="32" rx="30" ry="18" fill="#0f172a"/>
    <ellipse cx="60" cy="30" rx="12" ry="8" fill="#1e293b"/>
    <circle cx="60" cy="28" r="5" fill="#22d3ee" opacity="0.6"/>
    <ellipse cx="60" cy="200" rx="120" ry="80" fill="#22d3ee" opacity="0.03"/>
  </g>

  <!-- Access control panel -->
  <g transform="translate(920, 420)">
    <rect x="0" y="0" width="110" height="160" rx="8" fill="#1a2538" stroke="#334155" stroke-width="1.5"/>
    <rect x="12" y="14" width="86" height="56" rx="4" fill="url(#screen)"/>
    <rect x="20" y="24" width="40" height="4" rx="2" fill="#22d3ee" opacity="0.6"/>
    <rect x="20" y="34" width="60" height="3" rx="1.5" fill="#64748b" opacity="0.5"/>
    <rect x="20" y="42" width="50" height="3" rx="1.5" fill="#64748b" opacity="0.4"/>
    <!-- Keypad -->
    <g transform="translate(18, 82)">
      <rect x="0" y="0" width="18" height="14" rx="3" fill="#253347"/>
      <rect x="24" y="0" width="18" height="14" rx="3" fill="#253347"/>
      <rect x="48" y="0" width="18" height="14" rx="3" fill="#253347"/>
      <rect x="0" y="20" width="18" height="14" rx="3" fill="#253347"/>
      <rect x="24" y="20" width="18" height="14" rx="3" fill="#22d3ee" opacity="0.25"/>
      <rect x="48" y="20" width="18" height="14" rx="3" fill="#253347"/>
      <rect x="0" y="40" width="18" height="14" rx="3" fill="#253347"/>
      <rect x="24" y="40" width="18" height="14" rx="3" fill="#253347"/>
      <rect x="48" y="40" width="18" height="14" rx="3" fill="#253347"/>
    </g>
    <!-- Badge reader -->
    <rect x="30" y="148" width="50" height="8" rx="4" fill="#334155"/>
    <rect x="38" y="150" width="34" height="4" rx="2" fill="#22d3ee" opacity="0.5"/>
    <!-- NFC glow -->
    <ellipse cx="55" cy="152" rx="20" ry="6" fill="#22d3ee" opacity="0.15" filter="url(#soft-blur)"/>
  </g>

  <!-- Technician with tablet (subtle silhouette) -->
  <g transform="translate(1050, 480)" opacity="0.85">
    <ellipse cx="90" cy="195" rx="70" ry="12" fill="#000" opacity="0.45"/>
    <rect x="60" y="70" width="60" height="95" rx="10" fill="#152a45"/>
    <circle cx="90" cy="48" r="26" fill="#1e3a5f"/>
    <rect x="35" y="88" width="22" height="65" rx="8" fill="#152a45"/>
    <rect x="123" y="78" width="22" height="55" rx="8" fill="#152a45"/>
    <rect x="128" y="95" width="42" height="52" rx="6" fill="#0c1929" stroke="#334155" stroke-width="1"/>
    <rect x="132" y="100" width="34" height="38" rx="3" fill="#082f49"/>
    <rect x="136" y="108" width="18" height="3" rx="1.5" fill="#22d3ee" opacity="0.7"/>
    <rect x="136" y="116" width="26" height="2" rx="1" fill="#64748b" opacity="0.5"/>
    <rect x="136" y="122" width="22" height="2" rx="1" fill="#64748b" opacity="0.4"/>
    <circle cx="148" cy="130" r="4" fill="#22c55e" opacity="0.8"/>
  </g>

  <!-- Cable tray detail -->
  <g opacity="0.6">
    <rect x="200" y="100" width="1200" height="8" rx="4" fill="#1e293b"/>
    <rect x="240" y="104" width="3" height="3" rx="1" fill="#22d3ee" opacity="0.4"/>
    <rect x="380" y="104" width="3" height="3" rx="1" fill="#22d3ee" opacity="0.3"/>
    <rect x="520" y="104" width="3" height="3" rx="1" fill="#22d3ee" opacity="0.4"/>
    <rect x="900" y="104" width="3" height="3" rx="1" fill="#22d3ee" opacity="0.3"/>
    <rect x="1100" y="104" width="3" height="3" rx="1" fill="#22d3ee" opacity="0.4"/>
  </g>

  <!-- Status overlay lines (monitoring UI feel) -->
  <g opacity="0.35">
    <rect x="1240" y="580" width="280" height="160" rx="10" fill="#0a1220" stroke="#1e3a5f" stroke-width="1"/>
    <rect x="1256" y="596" width="248" height="100" rx="6" fill="#061018"/>
    <rect x="1270" y="612" width="80" height="50" rx="3" fill="#0c4a6e" opacity="0.5"/>
    <rect x="1360" y="612" width="80" height="50" rx="3" fill="#0c4a6e" opacity="0.4"/>
    <rect x="1450" y="612" width="40" height="50" rx="3" fill="#0c4a6e" opacity="0.3"/>
    <circle cx="1270" cy="720" r="4" fill="#22c55e"/>
    <text x="1282" y="724" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11">LIVE</text>
    <circle cx="1340" cy="720" r="4" fill="#22d3ee"/>
    <text x="1352" y="724" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="11">ACCČS</text>
  </g>

  <!-- Vignette -->
  <rect width="1600" height="900" fill="url(#sky)" opacity="0" style="mix-blend-mode:multiply"/>
  <rect x="0" y="0" width="1600" height="900" fill="none" stroke="none"/>
  <rect width="1600" height="900" fill="radial-gradient(ellipse at center, transparent 40%, #04080f 100%)" opacity="0.5"/>
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="50%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#04080f" stop-opacity="0.65"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#vignette)"/>
</svg>
