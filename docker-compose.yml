services:
  postgres:
    image: postgres:16-alpine
    container_name: pbgtelecom-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pbg
      POSTGRES_PASSWORD: pbg_secret
      POSTGRES_DB: pbgtelecom
    ports:
      - "5432:5432"
    volumes:
      - pbg_postgres_data:/var/lib/postgresql/data

volumes:
  pbg_postgres_data:
